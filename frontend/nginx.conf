server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: mọi route phía client đều trả index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache asset có hash (Vite) lâu dài; index.html không cache để luôn lấy bản mới
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
