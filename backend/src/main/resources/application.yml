server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: chat

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 6000ms

    lettuce:
      pool:
        max-active: 32
        max-idle: 16
        min-idle: 8

  cache:
    type: redis
    redis:
      use-key-prefix: false
      cache-null-values: false

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 32MB



jwt:
  secret: ${JWT_SECRET}
  expiration_access: 900000  # milliseconds, tinh ra la = 15p, dung de test login
  expiration_refresh: 604800000 # milliseconds, tinh ra la = 7 * 24 * 60 * 60 * 1000

cookie:
  expiration: 604800 # in seconds

app:
  media:
    # Thư mục gốc lưu file (trong Docker mount volume vào đây; local dev mặc định ./chat-media)
    root: ${MEDIA_ROOT:./chat-media}
    # Prefix URL public (nginx serve ở prod; vite proxy + resource handler ở dev)
    url-prefix: ${MEDIA_URL_PREFIX:/media}