# Local dev (app chạy trên IDE, port 8080):
#   docker compose up -d
#   → chỉ bật redis + database (localhost:6379, localhost:5432)
#
# Full stack (app trong Docker + nginx):
#   docker compose --profile prod up -d --build
#   docker compose --profile prod up -d --build --scale app=3

services:
  nginx:
    profiles: ["prod"]
    image: nginx:1.27-alpine
    container_name: nginx-chat
    ports:
      - "80:80"
    # Larger accept backlog to survive the 5000-client handshake storm.
    # somaxconn is net-namespaced, so it can be set per-container here.
    sysctls:
      net.core.somaxconn: 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_data:/var/www/media:ro
    depends_on:
      - app
      # - frontend
    networks:
      - backend

  # frontend:
  #   profiles: ["prod"]
  #   build:
  #     context: ../frontend
  #     args:
  #       # Cùng origin qua nginx :80 nên dùng host "localhost"
  #       VITE_API_BASE_URL: http://localhost
  #       VITE_WS_BASE_URL: ws://localhost
  #   networks:
  #     - backend

  app:
    profiles: ["prod"]
    build: .
    env_file:
      - .env.prod
    environment:
      # logback-spring.xml ghi log vào đây; bind-mount ra ./logs trên host
      LOG_PATH: /app/logs
    mem_limit: 1.5g
    # somaxconn is net-namespaced; set it per-container. Must be paired with
    # Tomcat's server.tomcat.accept-count (it's clamped by this value).
    sysctls:
      net.core.somaxconn: 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - media_data:/var/www/media
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_started
      database:
        condition: service_healthy
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    container_name: redis-chat
    ports:
      - "6379:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - backend

  database:
    image: postgres:15-alpine
    container_name: db
    mem_limit: 1g
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: "123"
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./db_script.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sample.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

    # broker:
    #   image: apache/kafka:3.9.1
    #   hostname: broker
    #   container_name: broker
    #   mem_limit: 1g
    #   ports:
    #     - "9092:9092"
