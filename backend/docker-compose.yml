# Local dev (app chạy trên IDE, port 8080):
#   docker compose up -d
#   → chỉ bật redis + database (localhost:6379, localhost:5432)
#
# Full stack (app trong Docker + nginx):
#   docker compose --profile prod up -d --build
#   docker compose --profile prod up -d --build --scale app=3

services:
  nginx:
    profiles: ["prod"]
    image: nginx:1.27-alpine
    container_name: nginx-chat
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - backend

  app:
    profiles: ["prod"]
    build: .
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_started
      database:
        condition: service_healthy
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    container_name: redis-chat
    ports:
      - "6379:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - backend

  database:
    image: postgres:15-alpine
    container_name: db
    mem_limit: 512m
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: "123"
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./db_script.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sample.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

volumes:
  redis_data:
  database_data:

networks:
  backend:
    driver: bridge