# auto = dùng hết số core; mỗi worker có ngân sách worker_connections riêng.
worker_processes auto;
# Nâng trần file descriptor cho mỗi worker (mỗi connection = 1 fd).
# Phải >= worker_connections, nếu không nginx sẽ chặn ở fd trước khi đạt worker_connections.
worker_rlimit_nofile 65535;

events {
    # Mỗi WebSocket proxy ăn 2 connection (client->nginx + nginx->app),
    # nên 16384 ~ 8000 WS đồng thời / worker. Trần cũ 1024 => chỉ ~512 WS.
    worker_connections 16384;
}

http {
    # Docker embedded DNS — cho phép nginx resolve lại khi scale app
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Mặc định 1MB → video lớn sẽ lỗi 413. Nới cho upload media (đồng bộ Spring multipart 210MB).
    client_max_body_size 210m;

    server {
        listen 80;
        server_name _;

        # Media tĩnh: nginx đọc thẳng từ volume media_data (mount ro), không qua app.
        location /media/ {
            alias /var/www/media/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /ws {
            set $backend_upstream http://app:8080;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # REST API → backend (mọi controller Spring đều dưới /api)
        location /api {
            set $backend_upstream http://app:8080;
            proxy_pass $backend_upstream;
            # Stream upload lớn lên app thay vì buffer cả body 30MB vào temp file.
            proxy_request_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Còn lại → frontend SPA tĩnh
        location / {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
